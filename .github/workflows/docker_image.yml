name: Docker image

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'

  # Build on pushes to main branch or version tags
  push:
    branches:
      - main
      - 'build-*'
    tags:
      - 'v*'
    paths-ignore:
      - 'README*.md'
      - 'CLAUDE.md'
      - '.gitignore'

env:
  PLATFORMS: linux/amd64,linux/arm64
  DOCKER_HUB_REPOSITORY: ${{ github.repository }}

jobs:
  docker:
    name: Docker build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU for multi-arch build
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_REPOSITORY }}
          tags: |
            # Manual dispatch: use the provided tag as-is
            type=raw,value=${{ github.event.inputs.docker_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            # Immutable per-commit tag, e.g. sha-a1b2c3d
            type=sha,prefix=sha-
            # Immutable per-run tag, e.g. build-42
            type=raw,value=build-${{ github.run_number }}
            # Branch name on branch pushes, e.g. main
            type=ref,event=branch
            # SemVer tags from git tags v1.2.3 -> 1.2.3 and 1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 'latest' only on the default branch (main)
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
